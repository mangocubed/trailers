name: CD

on:
    release:
        types: [published]

    workflow_dispatch:

env:
    CARGO_TERM_COLOR: always
    DATABASE_URL: postgres://mango3:mango3@127.0.0.1:5432/trailers_dev

jobs:
    build_api:
        runs-on: ubuntu-24.04
        services:
            postgres:
                image: postgres:18-alpine
                env:
                    POSTGRES_USER: mango3
                    POSTGRES_PASSWORD: mango3
                    POSTGRES_DB: trailers_dev
                ports:
                    - 5432:5432
                options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

        steps:
            - uses: actions/checkout@v6
            - uses: ./.github/actions/setup-rust
            - run: cargo build --package trailers-api --release
            - uses: actions/upload-artifact@v7
              with:
                  name: trailers_api_build
                  path: ./target/release/trailers-api
                  retention-days: 1

    build_cli:
        runs-on: ubuntu-24.04
        services:
            postgres:
                image: postgres:18-alpine
                env:
                    POSTGRES_USER: mango3
                    POSTGRES_PASSWORD: mango3
                    POSTGRES_DB: trailers_dev
                ports:
                    - 5432:5432
                options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

        steps:
            - uses: actions/checkout@v6
            - uses: ./.github/actions/setup-rust
            - run: cargo build --package trailers-cli --release
            - uses: actions/upload-artifact@v7
              with:
                  name: trailers_cli_build
                  path: ./target/release/trailers-cli
                  retention-days: 1

    build_monitor:
        runs-on: ubuntu-24.04
        services:
            postgres:
                image: postgres:17-alpine
                env:
                    POSTGRES_USER: mango3
                    POSTGRES_PASSWORD: mango3
                    POSTGRES_DB: trailers_dev
                ports:
                    - 5432:5432
                options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

        steps:
            - uses: actions/checkout@v6
            - uses: ./.github/actions/setup-rust
            - run: cargo build --package trailers-monitor --release
            - uses: actions/upload-artifact@v7
              with:
                  name: trailers_monitor_build
                  path: ./target/release/trailers-monitor
                  retention-days: 1

    deploy:
        needs: [build_api, build_cli, build_monitor]
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v6
            - uses: actions/download-artifact@v7
              with:
                  name: trailers_api_build
                  path: builds/
            - uses: actions/download-artifact@v7
              with:
                  name: trailers_cli_build
                  path: builds/
            - uses: actions/download-artifact@v7
              with:
                  name: trailers_monitor_build
                  path: builds/
            - name: Run deploy script
              run: ${{ secrets.DEPLOY_SCRIPT }}
