[workspace]
resolver = "3"
members = ["api", "cli", "core", "monitor"]

[workspace.package]
version = "0.0.0-alpha.0"
edition = "2024"
authors = ["Javier E. <jaedns@gmail.com>"]
homepage = "https://trailers.mango3.app"
repository = "https://github.com/mangocubed/trailers"

[workspace.dependencies]
apalis = "1.0.0-rc.3"
async-graphql = "8.0.0-rc.1"
envconfig = "0.11.1"
serde = "1.0.228"
tokio = { version = "1.49.0", features = [
    "macros",
    "rt-multi-thread",
    "signal",
] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.22", features = ["env-filter"] }
trailers-core = { path = "./core", default-features = false }
