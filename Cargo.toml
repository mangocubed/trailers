[workspace]
resolver = "3"
members = ["api", "cli", "core"]

[workspace.package]
version = "0.0.0-alpha.0"
edition = "2024"
authors = ["Javier E. <jaedns@gmail.com>"]
homepage = "https://trailers.mango3.app"
repository = "https://github.com/mangocubed/trailers"

[workspace.dependencies]
apalis = "1.0.0-rc.2"
async-graphql = "8.0.0-rc.1"
tokio = { version = "1.49.0", features = ["macros", "rt-multi-thread"] }
trailers-core = { path = "./core" }
