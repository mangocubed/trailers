[package]
name = "trailers-core"
version.workspace = true
edition.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true

[build-dependencies]
chrono = "0.4.43"

[dependencies]
apalis.workspace = true
apalis-redis = "1.0.0-rc.2"
async-graphql = { workspace = true, features = ["chrono", "uuid"] }
argon2 = "0.5.3"
cached = { version = "0.56.0", features = [
    "async",
    "redis_store",
    "redis_tokio",
] }
chrono = { version = "0.4.43", features = ["serde"] }
envconfig = "0.11.1"
regex = "1.12.2"
serde = "1.0.228"
serde_json = "1.0.149"
sqlx = { version = "0.8.6", features = [
    "chrono",
    "postgres",
    "runtime-tokio",
    "uuid",
] }
tokio.workspace = true
uuid = "1.20.0"
